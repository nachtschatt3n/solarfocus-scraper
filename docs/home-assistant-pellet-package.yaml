# Home Assistant package for pellet-consumption tracking + alerts.
#
# Drop this into /config/packages/pellet.yaml and ensure the top of
# /config/configuration.yaml contains:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# After copying, restart Home Assistant once. All entities below will
# auto-create. The dashboard YAML at the bottom of this file (the
# `# === LOVELACE` block) is *not* loaded automatically — paste it
# into a Lovelace view via Edit Dashboard → Raw configuration.
#
# Source data published by the solarfocus-scraper:
#   sensor.solarfocus_pellet_heater_pelletsverbrauch
#       cumulative kg, monotonically increasing
#   binary_sensor.solarfocus_pellet_heater_pellet_probe_1
#       ... through _6 — on=full, off=empty (one per silo probe)

# ---------------------------------------------------------------------------
# 1) Actual consumption per period (auto-resets at each cycle boundary)
#
#    HA QUIRK: utility_meter generates the entity_id slug from `name:`,
#    not the dict key. So `name: "Pellet consumption (current hour)"`
#    yields entity_id `sensor.pellet_consumption_current_hour`, not
#    `sensor.pellet_consumption_hourly`. The Lovelace block at the
#    bottom of this file references the auto-generated slugs.
#
#    If you'd rather have the slug match the dict key, drop `name:`
#    entirely — but then the friendly name in the UI defaults to the
#    capitalized dict key ("Pellet consumption hourly").
# ---------------------------------------------------------------------------

utility_meter:
  pellet_consumption_hourly:
    name: Pellet consumption (current hour)
    source: sensor.solarfocus_pellet_heater_pelletsverbrauch
    cycle: hourly
  pellet_consumption_daily:
    name: Pellet consumption (today)
    source: sensor.solarfocus_pellet_heater_pelletsverbrauch
    cycle: daily
  pellet_consumption_weekly:
    name: Pellet consumption (this week)
    source: sensor.solarfocus_pellet_heater_pelletsverbrauch
    cycle: weekly
  pellet_consumption_monthly:
    name: Pellet consumption (this month)
    source: sensor.solarfocus_pellet_heater_pelletsverbrauch
    cycle: monthly
  pellet_consumption_yearly:
    name: Pellet consumption (this year)
    source: sensor.solarfocus_pellet_heater_pelletsverbrauch
    cycle: yearly

# ---------------------------------------------------------------------------
# 2) Sliding-window totals (used by the average-per-period templates below)
#    `state_characteristic: change` returns the monotonic increase across
#    the window — exactly the consumption in those last N days.
# ---------------------------------------------------------------------------

sensor:
  - platform: statistics
    name: Pellet consumption past 7 days
    unique_id: pellet_consumption_past_7_days
    entity_id: sensor.solarfocus_pellet_heater_pelletsverbrauch
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000
  - platform: statistics
    name: Pellet consumption past 30 days
    unique_id: pellet_consumption_past_30_days
    entity_id: sensor.solarfocus_pellet_heater_pelletsverbrauch
    state_characteristic: change
    max_age:
      days: 30
    sampling_size: 10000
  - platform: statistics
    name: Pellet consumption past 365 days
    unique_id: pellet_consumption_past_365_days
    entity_id: sensor.solarfocus_pellet_heater_pelletsverbrauch
    state_characteristic: change
    max_age:
      days: 365
    sampling_size: 100000

# ---------------------------------------------------------------------------
# 3) Average-per-period sensors + the empty-probe count helper
#
#    The 30d window is the most reliable for "average per day": the 7d
#    window is too short for stable means, the 365d window takes a year
#    to fill. Once the heater has run for 30+ days the values stabilize.
# ---------------------------------------------------------------------------

template:
  - sensor:
      - name: Pellet avg per day (7d)
        unique_id: pellet_avg_per_day_7d
        unit_of_measurement: kg
        state: >
          {{ ((states('sensor.pellet_consumption_past_7_days') | float(0)) / 7)
             | round(2) }}

      - name: Pellet avg per day (30d)
        unique_id: pellet_avg_per_day_30d
        unit_of_measurement: kg
        state: >
          {{ ((states('sensor.pellet_consumption_past_30_days') | float(0)) / 30)
             | round(2) }}

      - name: Pellet avg per week
        unique_id: pellet_avg_per_week
        unit_of_measurement: kg
        state: >
          {{ ((states('sensor.pellet_consumption_past_30_days') | float(0)) / 30 * 7)
             | round(1) }}

      - name: Pellet avg per month
        unique_id: pellet_avg_per_month
        unit_of_measurement: kg
        state: >
          {{ ((states('sensor.pellet_consumption_past_365_days') | float(0)) / 12)
             | round(1) }}

      - name: Pellet avg per year
        unique_id: pellet_avg_per_year
        unit_of_measurement: kg
        state: >
          {{ states('sensor.pellet_consumption_past_365_days') | float(0)
             | round(0) }}

      # Count of empty pellet-storage probes (0-6). Drives the alert below.
      # The hardcoded list is more reliable than regex matching on entity_id
      # patterns — explicit + obvious if names ever change.
      - name: Pellet probes empty
        unique_id: pellet_probes_empty
        unit_of_measurement: probes
        state: >
          {% set ids = [
            'binary_sensor.solarfocus_pellet_heater_pellet_probe_1',
            'binary_sensor.solarfocus_pellet_heater_pellet_probe_2',
            'binary_sensor.solarfocus_pellet_heater_pellet_probe_3',
            'binary_sensor.solarfocus_pellet_heater_pellet_probe_4',
            'binary_sensor.solarfocus_pellet_heater_pellet_probe_5',
            'binary_sensor.solarfocus_pellet_heater_pellet_probe_6',
          ] %}
          {{ ids | map('states') | reject('eq', 'on') | list | count }}

# ---------------------------------------------------------------------------
# 4) Two-stage alert: WARN at >=4 empty (matches the heater's
#    info_leerer_sonden=4 threshold), CRITICAL when all 6 are empty.
#
#    Replace <DEVICE_NAME> with your mobile-app device id (e.g. iphone_se,
#    pixel_8). You can find it under Settings → Devices & Services →
#    Mobile App → click your device → its entity_id ends in `notify.<id>`.
# ---------------------------------------------------------------------------

automation:
  - alias: Pellet probes empty alert
    description: Two-stage notification when pellet-storage probes go empty
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.pellet_probes_empty
        above: 3
        for:
          minutes: 15   # ride out a single misread cycle
        id: warn
      - platform: numeric_state
        entity_id: sensor.pellet_probes_empty
        above: 5
        for:
          minutes: 5
        id: critical
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: critical
            sequence:
              - service: notify.mobile_app_<DEVICE_NAME>
                data:
                  title: "🔥 Pellet silo CRITICAL"
                  message: All 6 probes empty — refill required NOW
                  data:
                    push:
                      interruption-level: critical
                    priority: high
                    ttl: 0
                    tag: pellet_critical
          - conditions:
              - condition: trigger
                id: warn
            sequence:
              - service: notify.mobile_app_<DEVICE_NAME>
                data:
                  title: "⚠ Pellet silo low"
                  message: >
                    {{ states('sensor.pellet_probes_empty') }} of 6 probes empty.
                    Schedule a refill soon.
                  data:
                    tag: pellet_warn

