---
# Weekly scheduled rebuild — picks up Debian and pip security patches
# without requiring a code change. The base image (python:3.12-slim-trixie)
# floats to whatever Debian 13 has on rebuild day, and `apt-get upgrade`
# in the Dockerfile applies any point-release security patches.
#
# Why this exists: a CVE scan on this image (Trivy 0.70.0, 2026-05-09)
# flagged 2 CRITICAL + 23 HIGH from Debian system libs (libgnutls30t64,
# libarchive13t64, libgif7) — none of which require code changes; they
# disappear on the next rebuild against fresh Debian. Without a scheduled
# rebuild, the image only changes when source code does, so OS CVEs
# accumulate quietly.
name: Scheduled Rebuild

on:
  schedule:
    # Every Monday at 06:00 UTC. Picks up Debian patches typically published
    # on Mondays/Tuesdays. Also clears any stale base-image vulns mid-week.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/solarfocus-scraper

jobs:
  rebuild:
    name: Weekly rebuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute date tag
        id: date
        run: echo "tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build & push (no-cache so base + apt are fresh)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          pull: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:weekly
            ${{ env.IMAGE }}:weekly-${{ steps.date.outputs.tag }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Trivy scan (informational — does not fail the build)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:weekly-${{ steps.date.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: table
